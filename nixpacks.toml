# nixpacks.toml

# Specify system packages needed, primarily for the 'canvas' dependency
[phases.setup]
aptPkgs = [
    "build-essential",
    "pkg-config",
    "libcairo2-dev",
    "libjpeg-dev",
    "libpango1.0-dev",
    "libgif-dev",
    "librsvg2-dev"
]

# Ensure Node.js version is respected (redundant with .node-version but good practice)
[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"